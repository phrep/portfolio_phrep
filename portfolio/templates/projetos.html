{% extends 'base.html' %}
{% block title %} Projetos | Meu Portfólio {% endblock %}

{% block content %}
    <section>
        <h1>Meus Projetos</h1>
        <p>Aqui estão alguns dos projetos que eu desenvolvi:</p>
        <ul>
            {% for key,data in projetos.items %}
            <li><a href="{% url 'detalhes_projeto' id_projeto=key %}">{{data.titulo}}  </a></li>

            {% endfor %}
        </ul>
    </section>
{% endblock %}
