{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfólio de Paulo Henrique de Almeida — Engenheiro de Dados especializado em IA, SAP S/4HANA, ETL/ELT e analytics.">
    <title>{% block title %}Meu Portfólio{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="{% url 'home' %}" class="brand">
                <span class="brand-mark">PH</span>
                <span class="brand-name">Paulo&nbsp;Henrique</span>
            </a>
            <nav class="main-nav" aria-label="Navegação principal">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'lista_projetos' %}">Projetos</a>
                <a href="{% url 'home' %}#contato" class="nav-cta">Contato</a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>© 2026 Paulo Henrique de Almeida.</p>
            <p class="footer-muted">Engenheiro de Dados · Todos os direitos reservados.</p>
        </div>
    </footer>
</body>
</html>
