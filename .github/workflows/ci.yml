name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: testserver

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar checagem de configuracao do Django
        run: python manage.py check

      - name: Coletar arquivos estaticos
        run: python manage.py collectstatic --noinput

      - name: Rodar testes
        run: python manage.py test

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Buildar imagem Docker
        run: docker build -t portfolio-ci-check .
        
  deploy:
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy na VM Oracle via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd ~/portfolio_phrep
            git pull origin main
            docker build -t portfolio-server .
            docker stop portfolio
            docker rm portfolio
            docker run -d \
              --name portfolio \
              --restart unless-stopped \
              -p 127.0.0.1:8080:8080 \
              --env-file .env \
              portfolio-server
            docker image prune -f

